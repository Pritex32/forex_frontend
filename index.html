<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex Signal Generator</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        .section { margin-bottom: 40px; }
        .metric { display: inline-block; margin: 10px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; background: #f9f9f9; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select, button { padding: 8px; margin: 5px 0; width: 100%; max-width: 300px; }
        button { background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .chart { margin: 20px 0; }
        .signal { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .buy { background-color: #d4edda; color: #155724; }
        .sell { background-color: #f8d7da; color: #721c24; }
        .hold { background-color: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Forex Entry/Exit Prediction (XGBoost Multiclass + S/R Zones)</h1>
            <p><strong>Disclaimer: Not a financial advise</strong></p>
        </div>

        <div class="section">
            <h2>Data Fetching</h2>
            <div class="form-group">
                <label for="instrument">Forex Pair:</label>
                <input type="text" id="instrument" value="GBP_USD">
            </div>
            <div class="form-group">
                <label for="granularity">Granularity:</label>
                <select id="granularity">
                    <option value="D">Daily</option>
                    <option value="H1">1 Hour</option>
                    <option value="H4">4 Hours</option>
                    <option value="M30">30 Minutes</option>
                    <option value="M15">15 Minutes</option>
                    <option value="M5">5 Minutes</option>
                    <option value="M1">1 Minute</option>
                </select>
            </div>
            <button onclick="fetchData()">Fetch Data</button>
            <div id="dataStatus"></div>
        </div>

        <div class="section">
            <h2>Model Training</h2>
            <div class="form-group">
                <label for="modelType">Model Type:</label>
                <select id="modelType">
                    <option value="lstm">LSTM</option>
                    <option value="cnn_lstm">CNN-LSTM</option>
                    <option value="xgboost">XGBoost</option>
                </select>
            </div>
            <button onclick="trainModel()">Train Model</button>
            <div id="trainStatus"></div>
        </div>

        <div class="section">
            <h2>Forecast</h2>
            <div class="form-group">
                <label for="nPeriods">Number of Days:</label>
                <input type="number" id="nPeriods" value="5">
            </div>
            <button onclick="predict()">Predict</button>
            <div id="forecastChart" class="chart"></div>
        </div>

        <div class="section">
            <h2>Signals</h2>
             <div class="form-group">
                <label for="signalModel">Model for Signals:</label>
                <select id="signalModel">
                    <option value="lstm">LSTM</option>
                    <option value="cnn_lstm">CNN-LSTM</option>
                    <option value="xgboost">XGBoost</option>
                </select>
            </div>
            <div class="form-group">
                <label for="riskPct">Risk %:</label>
                <input type="number" id="riskPct" value="1.0" step="0.1">
            </div>
            <div class="form-group">
                <label for="slPips">Stop Loss Pips:</label>
                <input type="number" id="slPips" value="30">
            </div>
            <div class="form-group">
                <label for="tpPips">Take Profit Pips:</label>
                <input type="number" id="tpPips" value="90">
            </div>
            <button onclick="generateSignals()">Generate Signals</button>
            <div id="signals"></div>
            <button onclick="executeTrade()" style="background-color: #28a745;">Execute Trade</button>
        </div>

        <div class="section">
            <h2>Technical Indicators</h2>
            <button onclick="loadIndicators()">Load Indicators</button>
            <div id="indicators"></div>
            <div id="rsiChart" class="chart"></div>
            <div id="macdChart" class="chart"></div>
            <div id="atrChart" class="chart"></div>
        </div>

            <div class="section">
                <h2>Charts</h2>
                <button onclick="load1HChart()">Load 1-Hour Chart</button>
                <div id="chart1H" class="chart"></div>
            </div>

            <div class="section">
                <h2>Anomaly Detection</h2>
                <button onclick="detectAnomalies()">Detect Anomalies</button>
                <div id="anomalies"></div>
            </div>

            <div class="section">
                <h2>Pivot Points</h2>
                <button onclick="loadPivots()">Load Pivots</button>
                <div id="pivots"></div>
            </div>
    </div>

    <script>
        const API_BASE = 'https://forex-app-rc3d.onrender.com';  // Local development
        let dataFetched = false;
        let modelTrained = false;
        let currentSignals = {};
        let fetchedData = [];

        async function fetchData() {
            const instrument = document.getElementById('instrument').value;
            const granularity = document.getElementById('granularity').value;
            const response = await fetch(`${API_BASE}/api/data/fetch`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ instrument: instrument, granularity: granularity })
            });
            const result = await response.json();
            document.getElementById('dataStatus').innerText = result.message;
            fetchedData = result.data;
            dataFetched = true;
        }

        async function trainModel() {
            if (!dataFetched) {
                alert('Fetch data first');
                return;
            }
            const modelType = document.getElementById('modelType').value;
            const response = await fetch(`${API_BASE}/api/models/train`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: fetchedData, model_type: modelType })
            });
            const result = await response.json();
            document.getElementById('trainStatus').innerText = result.message;
            modelTrained = true;
        }

        async function predict() {
            if (!modelTrained) {
                alert('Train model first');
                return;
            }
            const modelType = document.getElementById('modelType').value;
            const nPeriods = document.getElementById('nPeriods').value;
            const response = await fetch(`${API_BASE}/api/models/predict`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model_type: modelType, n_periods: parseInt(nPeriods) })
            });
            const predictions = await response.json();
            if (predictions.signal) {
                document.getElementById('forecastChart').innerHTML = `<div class="signal ${predictions.signal.toLowerCase()}">Predicted Signal: ${predictions.signal}</div>`;
            } else {
                const dates = predictions.map(p => p.dates);
                const opens = predictions.map(p => p.open);
                const data = [{ x: dates, y: opens, type: 'line', name: 'Forecast', mode: 'lines+markers', marker: { color: 'red' } }];
                Plotly.newPlot('forecastChart', data);
            }
        }

        async function generateSignals() {
            if (!modelTrained) {
                alert('Train model first');
                return;
            }
            const signalModel = document.getElementById('signalModel').value;
            const riskPct = document.getElementById('riskPct').value;
            const slPips = document.getElementById('slPips').value;
            const tpPips = document.getElementById('tpPips').value;
            const response = await fetch(`${API_BASE}/api/signals/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model_type: signalModel, risk_pct: parseFloat(riskPct), sl_pips: parseInt(slPips), tp_pips: parseInt(tpPips) })
            });
            const signals = await response.json();
            currentSignals = signals;
            const signalsDiv = document.getElementById('signals');
            signalsDiv.innerHTML = `
                <div class="metric">Current Price: ${signals.current_price.toFixed(4)}</div>
                <div class="metric">Predicted Price: ${signals.predicted_price.toFixed(4)}</div>
                <div class="signal ${signals.signal.toLowerCase()}">Signal: ${signals.signal}</div>
                <div class="signal ${signals.atr_signal.toLowerCase()}">ATR Signal: ${signals.atr_signal}</div>
                <div class="signal ${signals.pivot_signal.toLowerCase()}">Pivot Signal: ${signals.pivot_signal}</div>
                <div class="signal ${signals.smart_money_signal.replace(' ', '').toLowerCase()}">Smart Money Signal: ${signals.smart_money_signal}</div>
            `;
        }

        async function executeTrade() {
            if (!currentSignals.signal || currentSignals.signal === 'Hold') {
                alert('No trade signal');
                return;
            }
            const response = await fetch(`${API_BASE}/api/trading/place_order`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    signal: currentSignals.signal,
                    current_price: currentSignals.current_price,
                    risk_pct: currentSignals.risk_pct,
                    sl_pips: currentSignals.sl_pips,
                    tp_pips: currentSignals.tp_pips
                })
            });
            const result = await response.json();
            alert(result.message);
        }

        async function loadIndicators() {
            const response = await fetch(`${API_BASE}/api/indicators/values`);
            const ind = await response.json();
            if (ind.error) {
                alert(ind.error);
                return;
            }
            const indDiv = document.getElementById('indicators');
            indDiv.innerHTML = `
                <div class="metric">RSI: ${ind.rsi}</div>
                <div class="metric">MACD: ${ind.macd}</div>
                <div class="metric">MACD Signal: ${ind.macd_signal}</div>
                <div class="metric">ATR: ${ind.atr}</div>
            `;

            const rsiResponse = await fetch(`${API_BASE}/api/indicators/charts/rsi`);
            const rsiFig = await rsiResponse.json();
            Plotly.newPlot('rsiChart', rsiFig.data, rsiFig.layout);

            const macdResponse = await fetch(`${API_BASE}/api/indicators/charts/macd`);
            const macdFig = await macdResponse.json();
            Plotly.newPlot('macdChart', macdFig.data, macdFig.layout);

            const atrResponse = await fetch(`${API_BASE}/api/indicators/charts/atr`);
            const atrFig = await atrResponse.json();
            Plotly.newPlot('atrChart', atrFig.data, atrFig.layout);
        }

        async function load1HChart() {
            const response = await fetch(`${API_BASE}/api/indicators/charts/1h`);
            const fig = await response.json();
            Plotly.newPlot('chart1H', fig.data, fig.layout);
        }

        async function detectAnomalies() {
            const response = await fetch(`${API_BASE}/api/indicators/anomaly/detection`);
            const result = await response.json();
            if (result.error) {
                alert(result.error);
                return;
            }
            const anomaliesDiv = document.getElementById('anomalies');
            anomaliesDiv.innerHTML = `
                <div class="metric">Anomalies Detected: ${result.anomalies.length}</div>
                <div class="metric">Clusters: ${Math.max(...result.clusters) + 1}</div>
            `;
        }

        async function loadPivots() {
            const response = await fetch(`${API_BASE}/api/indicators/pivot/values`);
            const pivots = await response.json();
            if (pivots.error) {
                alert(pivots.error);
                return;
            }
            const pivotsDiv = document.getElementById('pivots');
            pivotsDiv.innerHTML = `
                <div class="metric">Pivot: ${pivots.pivot.toFixed(4)}</div>
                <div class="metric">R1: ${pivots.r1.toFixed(4)}</div>
                <div class="metric">R2: ${pivots.r2.toFixed(4)}</div>
                <div class="metric">S1: ${pivots.s1.toFixed(4)}</div>
                <div class="metric">S2: ${pivots.s2.toFixed(4)}</div>
            `;
        }
    </script>
</body>
</html>
